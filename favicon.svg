<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="35%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#04060d"/>
  <!-- 背景の微星 -->
  <circle cx="13" cy="14" r="1.1" fill="#7e8ca0"/>
  <circle cx="52" cy="18" r="1" fill="#7dd3c8" opacity="0.8"/>
  <circle cx="48" cy="50" r="1.1" fill="#7e8ca0"/>
  <circle cx="16" cy="48" r="1" fill="#9aa6ba" opacity="0.7"/>
  <!-- 軌道 -->
  <ellipse cx="32" cy="32" rx="23" ry="11" fill="none" stroke="#ffb454" stroke-opacity="0.28" stroke-width="1.6" transform="rotate(-24 32 32)"/>
  <!-- 中心の恒星（太陽） -->
  <circle cx="32" cy="32" r="20" fill="url(#glow)"/>
  <circle cx="32" cy="32" r="7.5" fill="#fff3df"/>
  <!-- 軌道上の惑星 -->
  <circle cx="51" cy="25" r="3.4" fill="#7dd3c8"/>
</svg>
