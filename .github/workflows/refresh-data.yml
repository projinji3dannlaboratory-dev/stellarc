# STELLARC データ週次更新バッチ
# edinetdb.jp から最新データを取得して stellarc_data.js を再生成し、
# 変更があればコミット&push する。GitHub Pages は main/root から配信され、
# push を検知して自動で再デプロイされる（ビルド手順は不要）。
#
# Schedule: 毎週月曜 00:00 UTC（= 09:00 JST）。手動実行も可。
# （時価総額を週次で更新。1回あたり約30リクエストで無料枠100/日に十分収まる）
#
# 必要な GitHub Secret:
#   EDINETDB_API_KEY  — edinetdb.jp APIキー（Settings → Secrets and variables → Actions）
name: Refresh STELLARC Data

on:
  schedule:
    - cron: "0 0 * * 1"   # 毎週月曜 00:00 UTC == 月曜 09:00 JST
  workflow_dispatch:       # Actionsタブから手動実行も可能

permissions:
  contents: write          # 更新後の stellarc_data.js をコミットするため

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch latest data from edinetdb.jp
        env:
          EDINETDB_API_KEY: ${{ secrets.EDINETDB_API_KEY }}
          PYTHONIOENCODING: "utf-8"
        run: python fetch_edinetdb.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stellarc_data.js
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh stellarc_data.js ($(date -u +%Y-%m-%d))"
            git push
          fi
